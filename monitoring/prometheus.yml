global:
  scrape_interval: 15s

scrape_configs:

  - job_name: "analytics-service"
    static_configs:
      - targets: ["analytics-service:8002"]

  - job_name: "auth-service"
    static_configs:
      - targets: ["auth-service:8001"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
